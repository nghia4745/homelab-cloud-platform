name: Integration Test

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  integration-test:
    runs-on: self-hosted
    # Skip fork PRs — they cannot access runner secrets.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      # Build image from source - no GHCR pull needed for tests
      - name: Build test image
        run: docker build -t homelab-api:test .
      
      # Remove any stale cluster left by a previous run on the self-hosted runner.
      - name: Delete existing Kind integration cluster
        run: kind delete cluster --name integration || true
      
      # Isolated cluster so never conflicts with the dev cluster.
      - name: Create Kind integration cluster
        run: kind create cluster --name integration --wait 60s

      # Load the locally built image directly - no registry, no pull secret needed.
      - name: Load test image into Kind
        run: kind load docker-image homelab-api:test --name integration
      
      - name: Apply test namespace
        run: |
          kubectl apply -f k8s/namespaces/app.yaml --context kind-integration

      # Helm values expect an image pull secret. For integration tests we use a
      # placeholder secret and local image loaded into Kind.
      - name: Create placeholder pull secret
        run: |
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace app \
            --docker-server=ghcr.io \
            --docker-username=placeholder \
            --docker-password=placeholder \
            --dry-run=client -o yaml | kubectl apply --context kind-integration -f -

      - name: Install app via Helm
        run: |
          helm upgrade --install homelab-api-app charts/homelab-api \
            --kube-context kind-integration \
            --namespace app \
            --values charts/homelab-api/values-dev.yaml \
            --set image.repository=homelab-api \
            --set image.tag=test \
            --set image.pullPolicy=IfNotPresent \
            --set ingress.enabled=false \
            --set hpa.enabled=false
      
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/homelab-api-app \
            --namespace app \
            --context kind-integration \
            --timeout=120s

      - name: Verify Helm release and list resources
        run: |
          helm list --kube-context kind-integration --namespace app
          helm status homelab-api-app --kube-context kind-integration --namespace app
          release_status=$(helm status homelab-api-app --kube-context kind-integration --namespace app | awk -F': ' '/^STATUS:/ {print $2}')
          echo "Detected Helm release status: ${release_status}"
          if [ "${release_status}" != "deployed" ]; then
            echo "Expected Helm release status to be deployed, got: ${release_status}"
            exit 1
          fi
          kubectl get deploy,pods,svc,ingress,hpa \
            --namespace app \
            --context kind-integration
          kubectl get events \
            --namespace app \
            --context kind-integration \
            --sort-by=.lastTimestamp | tail -n 20
        
      # Port 18080 avoids collision with the dev cluster on 8080.
      - name: Validate endpoints
        run: |
          kubectl port-forward service/homelab-api-app 18080:80 \
            --namespace app \
            --context kind-integration &
            sleep 3

            echo "--- /health ---"
            curl --fail http://localhost:18080/health

            echo "--- /api/greeting ---"
            curl --fail http://localhost:18080/api/greeting

            echo "--- /metrics ---"
            curl --fail http://localhost:18080/metrics | grep -q "app_requests_total" \
              && echo "metrics OK"

      # always() ensures cleanup even if a step above fails
      - name: Delete integration cluster
        if: always()
        run: kind delete cluster --name integration
      
      - name: Switch back to kind-homelab context
        if: always()
        run: |
          if kubectl config get-contexts -o name | grep -Fxq kind-homelab; then
            kubectl config use-context kind-homelab
          else
            echo "kind-homelab context not found; skipping context switch"
          fi
