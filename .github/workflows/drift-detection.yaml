# This GitHub Actions workflow performs hourly drift detection on Terraform-managed infrastructure.
# It checks for changes between the current state and the planned state, alerting if drift is detected.

# name: Hourly Drift Detection
name: Drift Detection (manual trigger)

# Triggers: Runs automatically at the start of every hour via cron schedule.
# Also allows manual triggering for testing purposes.
on:
  # schedule:
  #   # Runs at the start of every hour
  #   - cron: "0 * * * *"
  # Allows you to trigger it manually for testing
  workflow_dispatch:

jobs:
  # Job: Performs drift detection by running Terraform plan on the infrastructure.
  drift-check:
    runs-on: self-hosted
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: "us-east-1"
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
    steps:
      # Step 1: Checkout the repository code to access Terraform files.
      - name: Checkout code
        uses: actions/checkout@v5

      # Step 2: Initialize local Vault stack backend/providers.
      - name: Terraform Init (local vault)
        run: terraform -chdir=environments/local/vault init

      # Step 3: Initialize local app stack backend/providers.
      - name: Terraform Init (local app)
        run: terraform -chdir=environments/local/app init

      # Step 4: Run plan on both local stacks and return detailed drift signal.
      # Exit codes:
      # 0 = no changes, 2 = drift detected, 1 = error
      - name: Check for Drift (local vault + local app)
        id: drift
        continue-on-error: true
        run: |
          set +e

          terraform -chdir=environments/local/vault plan -detailed-exitcode
          VAULT_EXIT=$?

          terraform -chdir=environments/local/app plan -detailed-exitcode
          APP_EXIT=$?

          if [ "$VAULT_EXIT" -eq 1 ] || [ "$APP_EXIT" -eq 1 ]; then
            exit 1
          fi

          if [ "$VAULT_EXIT" -eq 2 ] || [ "$APP_EXIT" -eq 2 ]; then
            exit 2
          fi

          exit 0
