  #     AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  #     AWS_DEFAULT_REGION: "us-east-1"
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4

  #     - name: Run Checkov Action
  #       uses: bridgecrewio/checkov-action@master
  #       with:
  #         # Scan the entire directory
  #         directory: .
  #         # Stop the pipeline if a 'High' or 'Critical' risk is found
  #         soft_fail: false
  #         framework: terraform
  #         # This creates a nice summary in your GitHub Actions UI
  #         output_format: cli,sarif
  
  # Job 2: Active job - Runs Checkov on a self-hosted runner (local machine).
  # Uses AWS credentials and scans with custom policies from the 'policies' directory.
  checkov-scan:
    runs-on: self-hosted
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: "us-east-1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run Checkov on local machine (with Custom Policies)
        run: |
          checkov -d . --external-checks-dir policies --framework terraform
