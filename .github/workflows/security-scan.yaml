# This GitHub Actions workflow performs security scans on Terraform code using Checkov.
# It runs on pushes and pull requests to the main branch, ensuring infrastructure as code security.

name: Security Scan

# Triggers: Run the workflow on pushes or pull requests to the main branch.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Environment variables: Forces JavaScript actions to use Node.js 24 for compatibility.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Job 1: Commented out - Runs Checkov on GitHub-hosted runners (ubuntu-latest).
  # Uses AWS credentials from secrets for scanning.
  # checkov-scan:
