name: Build and Push to GHCR

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    if:
      github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
      security-events: write
      actions: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short=12 HEAD)
          echo "image_tag=sha-$SHORT_SHA" >> "$GITHUB_OUTPUT"
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/homelab-api:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ github.repository_owner }}/homelab-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/homelab-api:${{ steps.meta.outputs.image_tag }}
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Push image to GHCR
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/homelab-api:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ github.repository_owner }}/homelab-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
