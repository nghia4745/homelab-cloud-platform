name: Build and Push to GHCR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if:
      github.actor != 'github-actions[bot]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: self-hosted
    permissions:
      contents: write
      packages: write
      security-events: write
      actions: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short=12 HEAD)
          echo "image_tag=sha-$SHORT_SHA" >> "$GITHUB_OUTPUT"
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/homelab-api:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ github.repository_owner }}/homelab-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/homelab-api:${{ steps.meta.outputs.image_tag }}
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Push image to GHCR
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/homelab-api:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ github.repository_owner }}/homelab-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Update Helm image tag in Git (GitOps)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMAGE_TAG=${{ steps.meta.outputs.image_tag }}
          awk -v image_tag="$IMAGE_TAG" '
            /^image:[[:space:]]*$/ { in_image=1; print; next }
            in_image && /^[^[:space:]]/ { in_image=0 }
            in_image && /^([[:space:]]*)tag:[[:space:]]*/ {
              match($0, /^[[:space:]]*/)
              indent = substr($0, RSTART, RLENGTH)
              print indent "tag: " image_tag
              next
            }
            { print }
          ' charts/homelab-api/values.yaml > charts/homelab-api/values.yaml.tmp
          mv charts/homelab-api/values.yaml.tmp charts/homelab-api/values.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/homelab-api/values.yaml

          if git diff --cached --quiet; then
            echo "No values change to commit."
            exit 0
          fi

          git commit -m "chore(gitops): update homelab-api image tag to ${IMAGE_TAG}"
          git push
