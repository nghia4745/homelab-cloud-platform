name: Build and Push to GHCR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    if:
      github.actor != 'github-actions[bot]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write
      packages: write
      security-events: write
      actions: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short=12 HEAD)
          echo "image_tag=sha-$SHORT_SHA" >> "$GITHUB_OUTPUT"
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/homelab-api:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ github.repository_owner }}/homelab-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/homelab-api:${{ steps.meta.outputs.image_tag }}
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Push image to GHCR
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/homelab-api:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ github.repository_owner }}/homelab-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Update Helm image tag file (GitOps)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMAGE_TAG=${{ steps.meta.outputs.image_tag }}
          sed -E -i.bak "s|^  tag: .*|  tag: $IMAGE_TAG|g" charts/homelab-api/values.yaml
          rm -f charts/homelab-api/values.yaml.bak

      - name: Create PR for Helm image tag update (GitOps)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: chore(gitops): update homelab-api image tag to ${{ steps.meta.outputs.image_tag }}
          title: chore(gitops): update homelab-api image tag to ${{ steps.meta.outputs.image_tag }}
          body: |
            Automated GitOps update from CI.

            - Image tag: `${{ steps.meta.outputs.image_tag }}`
            - File: `charts/homelab-api/values.yaml`
          branch: ci/gitops-image-tag-${{ steps.meta.outputs.image_tag }}
          base: main
          add-paths: |
            charts/homelab-api/values.yaml
          delete-branch: true
