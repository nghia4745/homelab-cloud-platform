# Helm Values: Development Environment
# ====================================
# 
# This values file is optimized for **local Kind cluster testing**:
#   - Minimal replicas (2) for cost efficiency
#   - Relaxed resource requests/limits to fit on single developer machine
#   - Verbose logging for debugging
#   - Lower autoscale thresholds (more eager to add replicas for testing)
#
# Usage:
#   helm install homelab-api-app charts/homelab-api -n app -f charts/homelab-api/values-dev.yaml
#   helm upgrade homelab-api-app charts/homelab-api -n app -f charts/homelab-api/values-dev.yaml
#

replicaCount: 2

config:
  appEnv: dev
  logLevel: info

image:
  pullPolicy: IfNotPresent

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi
