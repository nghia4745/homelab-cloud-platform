# Ingress: External HTTP Routing
# ==============================
# Ingress defines how traffic from outside the cluster reaches this service.
#
# Operational notes:
# - This resource is created only when values.ingress.enabled is true.
# - ingressClassName selects ingress-nginx as the controller.
# - Path prefix `/` forwards all app paths to the service on port 80.
#
# End-to-end flow:
# localhost:8080 -> kind node port mapping -> ingress-nginx -> service -> pod.
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "homelab-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "homelab-api.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
