apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nghia4745/homelab-cloud-platform.git
    targetRevision: main
    path: charts/homelab-api
    helm:
      releaseName: homelab-api-app
      parameters:
        - name: fullnameOverride
          value: homelab-api-app
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
