apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-api-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nghia4745/homelab-cloud-platform.git
    targetRevision: main
    path: charts/homelab-api
    helm:
      releaseName: homelab-api-prod
      parameters:
        - name: fullnameOverride
          value: homelab-api-prod
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
