apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: homelab-api
  namespace: homelab
spec:
  # Scale this specific Deployment.
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: homelab-api
  # Keep at least two pods, scale up to five when under CPU pressure.
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        # Scale based on average CPU utilization compared to cpu requests.
        type: Utilization
        averageUtilization: 60
