metadata:
  name: "Ensure all S3 buckets have an Owner tag"
  id: "CKV_CUSTOM_1"
  category: "GENERAL_SECURITY"
  guidelines: "Every S3 bucket must have a tag named Owner for cost allocation."
definition:
  and:
    - cond_type: "attribute"
      resource_types:
        - "aws_s3_bucket"
      attribute: "tags.Owner"
      operator: "exists"