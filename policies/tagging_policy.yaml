metadata:
  name: "Ensure all S3 buckets have an Owner tag"
  id: "CKV_CUSTOM_1"
  category: "GENERAL_SECURITY"
scope:
  framework: terraform
definition:
  and:
    - cond_type: "filter"
      value:
        - "aws_s3_bucket"
      operator: "within"
      attribute: "resource_type"
    - cond_type: "attribute"
      attribute: "tags.Owner"
      operator: "exists"
